# ============================================================
#  Curso Spring Boot - Configuración de la aplicación
# ============================================================
spring.application.name=cursoSpringBoot

# ---- H2 In-Memory Database (solo para desarrollo) ----------
spring.datasource.url=jdbc:h2:mem:cursodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Muestra la consola de H2 en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate -----------------------------------------
# create-drop: crea el esquema al iniciar y lo borra al cerrar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Evita la advertencia de open-in-view
spring.jpa.open-in-view=false

# ---- Actuator ------------------------------------------------
# Expone solo los endpoints mínimos (salud e información de la app)
# Para producción: considera añadir Spring Security para protegerlos
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Curso Spring Boot
info.app.description=Proyecto MVC - Arquitectura de Software EAFIT
info.app.version=0.0.1-SNAPSHOT
